<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spatium | Cherri Cinema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --bg-2: #0a0a0a;
            --bg-3: #121212;
            --bg-4: #1a1a1a;
            --border-grey: #2a2a2a;
            --search-border: #1c1c1c;
            --accent: #f365ac;
            --accent-glow: rgba(243, 101, 172, 0.4);
            --text-white: #ffffff;
            --text-bright-grey: #e0e0e0;
            --text-grey: #b0b0b0;
            --nav-width: 75px;
            --tooltip-bg: #1a1a1a;
            
            /* Title Gradient */
            --cherri-pink-light: #ffb3d9;
            --cherri-pink-mid: #f365ac;
            --cherri-pink-soft-dark: #d64d92;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Figtree', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-white);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* Particles Background */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Sidebar Styling */
        #navbar {
            position: relative;
            z-index: 100;
            width: var(--nav-width);
            height: 100%;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-grey);
            display: flex;
            flex-direction: column;
            padding: 25px 0;
            align-items: center;
        }

        #navbar ul {
            list-style: none;
            width: 100%;
            padding: 0 12px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            left: -100px;
            transition: left 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #navbar ul#section3nav { margin-top: auto; }

        #navbar li {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            color: var(--text-grey);
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 auto;
        }

        #navbar li i { font-size: 1.3rem; }

        #navbar li:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-white);
        }

        #navbar li.active {
            background: rgba(243, 101, 172, 0.15);
            color: var(--accent);
        }

        .tooltip {
            position: absolute;
            left: 70px;
            background: var(--tooltip-bg);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--border-grey);
            z-index: 1000;
        }

        #navbar li:hover .tooltip {
            opacity: 1;
            transform: translateX(0);
        }

        /* Main Viewport */
        main {
            flex-grow: 1;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        main::-webkit-scrollbar { width: 6px; }
        main::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .hometitle {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: -4px;
            background: linear-gradient(to bottom, var(--cherri-pink-light) 0%, var(--cherri-pink-mid) 50%, var(--cherri-pink-soft-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px var(--accent-glow));
            user-select: none;
        }

        /* Search Area */
        .inputcontainer {
            background: var(--bg-2);
            border: 1px solid var(--search-border);
            border-radius: 16px;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        .inputcontainer:focus-within {
            border-color: var(--accent);
            background: var(--bg-3);
        }

        .inputcontainer input {
            background: none;
            border: none;
            outline: none;
            color: var(--text-white);
            font-size: 1.1rem;
            width: 100%;
        }

        /* Cinema Sections */
        details {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
            text-align: left;
        }

        summary {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-bright-grey);
            cursor: pointer;
            padding: 10px 0;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        summary:hover { color: var(--accent); }
        summary::before {
            content: "\f0da";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            transition: transform 0.3s;
        }
        details[open] summary::before { transform: rotate(90deg); }

        .zone-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        .zone-item {
            aspect-ratio: 2/3;
            background: var(--bg-2);
            border: 1px solid var(--border-grey);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .zone-item:hover {
            transform: scale(1.05);
            border-color: var(--accent);
        }

        .zone-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .zone-item:hover img { opacity: 1; }

        .zone-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
        }

        .zone-overlay h4 {
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Zone Viewer */
        #zoneViewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .zone-header {
            background: #111;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-grey);
        }

        #zoneName { color: var(--accent); font-size: 1.1rem; }

        .zone-controls { display: flex; gap: 10px; }
        .zone-controls button {
            background: var(--bg-3);
            border: 1px solid var(--border-grey);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .zone-controls button:hover { background: var(--bg-4); }

        #zoneFrame { flex-grow: 1; border: none; }

        /* Popups */
        #popupOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2100;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .popup {
            background: #0f0f0f;
            border: 1px solid var(--border-grey);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .popup-body {
            color: var(--text-grey);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .popup-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.3s;
        }

        .popup-btn:disabled {
            background: var(--bg-4);
            color: var(--text-grey);
            cursor: not-allowed;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            #navbar { width: 60px; }
            .zone-container { grid-template-columns: repeat(2, 1fr); }
            .hometitle { font-size: 3.5rem; }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <nav id="navbar">
        <ul id="section1nav">
            <li class="active" onclick="location.reload()">
                <i class="fa-solid fa-house"></i>
                <div class="tooltip">Home</div>
            </li>
        </ul>
        <ul id="section2nav">
            <li onclick="window.open('https://sites.google.com/view/spatium-capri/games', '_blank')">
                <i class="fa-solid fa-gamepad"></i><div class="tooltip">Games</div>
            </li>
            <li onclick="window.open('https://sites.google.com/view/spatium-capri/browser', '_blank')">
                <i class="fa-solid fa-globe"></i><div class="tooltip">Browser</div>
            </li>
            <li onclick="window.open('https://sites.google.com/view/spatium-capri/movies', '_blank')">
                <i class="fa-solid fa-video"></i><div class="tooltip">Movies & TV</div>
            </li>
            <li onclick="window.open('https://sites.google.com/view/spatium-capri/music', '_blank')">
                <i class="fa-solid fa-music"></i><div class="tooltip">Music</div>
            </li>
            <li onclick="window.open('https://sites.google.com/view/spatium-capri/ai', '_blank')">
                <i class="fa-solid fa-wand-magic-sparkles"></i><div class="tooltip">AI</div>
            </li>
        </ul>
        <ul id="section3nav">
            <li onclick="window.open('https://sites.google.com/view/spatium-capri/profile', '_blank')">
                <i class="fa-solid fa-user-gear"></i><div class="tooltip">Profile</div>
            </li>
            <li id="settingsBtn">
                <i class="fa-solid fa-gear"></i><div class="tooltip">Settings</div>
            </li>
        </ul>
    </nav>

    <main>
        <h1 class="hometitle">Cherri</h1>
        
        <div class="inputcontainer">
            <i class="fa-solid fa-magnifying-glass" style="color: var(--accent);"></i>
            <input type="text" id="searchBar" placeholder="Search for a movie..." oninput="filterMovies()">
        </div>

        <details open>
            <summary id="featuredSummary">Featured Vaults</summary>
            <div id="featuredMovies" class="zone-container"></div>
        </details>

        <details open>
            <summary id="allSummary">All Cinema</summary>
            <div id="container" class="zone-container"></div>
        </details>
    </main>

    <div id="zoneViewer">
        <div class="zone-header">
            <div class="zone-title">
                <h2 id="zoneName">Movie Name</h2>
            </div>
            <div class="zone-controls">
                <button id="openExternalBtn" title="Open in new tab"><i class="fa-solid fa-up-right-from-square"></i></button>
                <button onclick="fullscreenZone()"><i class="fa-solid fa-expand"></i></button>
                <button onclick="closeZone()">CLOSE</button>
            </div>
        </div>
        <iframe id="zoneFrame" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>

    <!-- Landing / Access Guide Popup -->
    <div id="popupOverlay">
        <div class="popup" id="mainPopup">
            <div class="popup-header">
                <h3 id="popupTitle">Welcome to Cherri</h3>
            </div>
            <div id="popupBody" class="popup-body">
                <!-- Content set by JS -->
            </div>
            <button id="popupConfirmBtn" class="popup-btn" disabled>Wait (7s)</button>
        </div>
    </div>

            { name: "Deadpool & Wolverine", featured: false, cover: "", url: "https://drive.google.com/file/d/17rO8-6BeGxZ_2HelJIU_mefZQ_j-cpIb/view?usp=drive_link" },
            { name: "Star Wars: Episode I - The Phantom Menace", featured: false, cover: "", url: "https://drive.google.com/file/d/1kxXlV-lNOjqSnqwiMQxYVrcbhxQl45Sw/view?usp=drive_link" },
            { name: "Star Wars: Episode III – Revenge of the Sith", featured: false, cover: "", url: "https://drive.google.com/file/d/1u0ZRN7s8rgAMYtvnGf3zTjpM7Fu6TmW_/view?usp=drive_link" },
            { name: "Star Wars: Episode II - Attack of the Clones", featured: false, cover: "", url: "https://drive.google.com/file/d/1lEszWnr2BinTfzBGqtoDV1W9wMIlTQtb/view?usp=drive_link" },
            { name: "Star Wars: Episode IV -  A New Hope", featured: false, cover: "", url: "https://drive.google.com/file/d/1nDgCNAuFgSI6fDKbRZFkDhzViib1ixYS/view?usp=drive_link" },
            { name: "Penguins of Madagascar", featured: false, cover: "", url: "https://drive.google.com/file/d/1FhmVu6-NhOXoY12O7qbmLfpugGU2GtVR/view?usp=drive_link" },
            { name: "Topgun", featured: false, cover: "", url: "https://drive.google.com/file/d/1YPdexiO1cHulGguqGvHKq0Grsnpdlbs1/view" },
        ].sort((a, b) => a.name.localeCompare(b.name));

        const pJS = function(tag_id) {
            const canvas_el = document.createElement('canvas');
            canvas_el.style.width = "100%"; canvas_el.style.height = "100%";
            document.getElementById(tag_id).appendChild(canvas_el);
            const ctx = canvas_el.getContext('2d');
            let canvas_w, canvas_h, particles = [];
            const init = () => {
                canvas_w = canvas_el.width = canvas_el.offsetWidth;
                canvas_h = canvas_el.height = canvas_el.offsetHeight;
                particles = [];
                for (let i = 0; i < 60; i++) {
                    const shade = Math.floor(Math.random() * 50) + 40; 
                    particles.push({
                        x: Math.random() * canvas_w, 
                        y: Math.random() * canvas_h,
                        vx: Math.random() * 1.5 + 0.5, 
                        vy: Math.random() * 1.5 + 0.5,
                        radius: Math.random() * 2 + 1, 
                        color: `rgb(${shade}, ${shade}, ${shade})`
                    });
                }
            };
            const draw = () => {
                ctx.clearRect(0, 0, canvas_w, canvas_h);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x > canvas_w) p.x = 0; 
                    if (p.y > canvas_h) p.y = 0;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                });
                requestAnimationFrame(draw);
            };
            window.addEventListener('resize', init);
            init(); draw();
        };

        function displayMovies(data, target) {
            target.innerHTML = "";
            data.forEach(movie => {
                const item = document.createElement("div");
                item.className = "zone-item";
                const cover = movie.cover || `https://via.placeholder.com/200x300?text=${encodeURIComponent(movie.name)}`;
                item.innerHTML = `
                    <img src="${cover}" loading="lazy" onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover'">
                    <div class="zone-overlay">
                        <h4>${movie.name}</h4>
                    </div>
                `;
                item.onclick = () => openMovie(movie);
                target.appendChild(item);
            });
        }

        function filterMovies() {
            const query = searchBar.value.toLowerCase();
            const filtered = movieDatabase.filter(m => m.name.toLowerCase().includes(query));
            displayMovies(filtered, container);
        }

        function triggerGuidancePopup() {
            popupTitle.textContent = "Access Guide";
            popupBody.innerHTML = `
                <p>Welcome to Cherri Cinema!</p>
                <p style="margin-top: 15px;">If a movie says <strong>"Access Denied"</strong> or won't load, click the <strong>"Open in New Tab"</strong> button <i class="fa-solid fa-up-right-from-square"></i> in the top right corner of the player.</p>
                <p style="margin-top:15px; font-size: 0.9rem; opacity: 0.7;">This fixes most loading issues.</p>
            `;
            
            let timeLeft = 7;
            popupConfirmBtn.disabled = true;
            popupConfirmBtn.textContent = `Wait (${timeLeft}s)`;
            popupConfirmBtn.onclick = closePopup;
            popupOverlay.style.display = "flex";

            const countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    popupConfirmBtn.textContent = `Wait (${timeLeft}s)`;
                } else {
                    clearInterval(countdown);
                    popupConfirmBtn.textContent = "Okay";
                    popupConfirmBtn.disabled = false;
                }
            }, 1000);
        }

        function openMovie(movie) {
            if (!movie.url) return;
            currentUrl = movie.url;
            zoneFrame.src = movie.url;
            document.getElementById('zoneName').textContent = movie.name;
            zoneViewer.style.display = "flex";
        }

        function openExternalNow() {
            if (currentUrl) window.open(currentUrl, '_blank');
        }

        openExternalBtn.onclick = openExternalNow;

        function closeZone() {
            zoneViewer.style.display = "none";
            zoneFrame.src = "about:blank";
            currentUrl = "";
        }

        function fullscreenZone() {
            if (zoneFrame.requestFullscreen) zoneFrame.requestFullscreen();
            else if (zoneFrame.webkitRequestFullscreen) zoneFrame.webkitRequestFullscreen();
        }

        function closePopup() { 
            popupOverlay.style.display = "none"; 
        }

        window.onload = () => {
            pJS('particles-js');
            displayMovies(movieDatabase, container);
            displayMovies(movieDatabase.filter(m => m.featured), featuredContainer);
            
            document.getElementById('allSummary').textContent = `All Cinema (${movieDatabase.length})`;
            document.getElementById('featuredSummary').textContent = `Featured Vaults (${movieDatabase.filter(m => m.featured).length})`;

            ['section1nav', 'section2nav', 'section3nav'].forEach((id, i) => {
                const navEl = document.getElementById(id);
                if (navEl) setTimeout(() => { navEl.style.left = "0"; }, 150 + (i * 120));
            });

            // Trigger the guidance popup immediately on land
            setTimeout(triggerGuidancePopup, 300);
        };

        document.getElementById('settingsBtn').onclick = () => {
            popupTitle.textContent = "Settings";
            popupBody.innerHTML = `
                <p style="color:#888; margin-bottom:20px;">Cherri Cinema V2 Configuration</p>
                <button onclick="location.reload()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; width:100%;">Refresh Gallery</button>
            `;
            popupConfirmBtn.textContent = "Close";
            popupConfirmBtn.disabled = false;
            popupConfirmBtn.onclick = closePopup;
            popupOverlay.style.display = "flex";
        };
    </script>
</body>
