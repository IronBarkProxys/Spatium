            --bg: #000000;

        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Figtree', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-white);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex;
        }

        #particles-js {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
        }

        #navbar {
            position: relative; z-index: 100;
            width: var(--nav-width); height: 100%;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-grey);
            display: flex; flex-direction: column;
            padding: 25px 0; align-items: center;
        }

        #navbar ul {
            list-style: none; width: 100%; padding: 0 12px; margin-bottom: 20px;
            display: flex; flex-direction: column; gap: 12px;
            position: relative; left: -100px;
            transition: left 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #navbar li {
            position: relative; display: flex; align-items: center; justify-content: center;
            width: 50px; height: 50px; border-radius: 14px;
            color: var(--text-grey); cursor: pointer; transition: all 0.3s ease;
        }

        #navbar li:hover { background: rgba(255, 255, 255, 0.08); color: var(--text-white); }
        #navbar li.active { background: rgba(243, 101, 172, 0.15); color: var(--accent); }

        .tooltip {
            position: absolute; left: 70px; background: #1a1a1a;
            color: white; padding: 8px 14px; border-radius: 8px; font-size: 0.85rem;
            opacity: 0; transform: translateX(-10px); transition: all 0.2s ease;
            border: 1px solid var(--border-grey); pointer-events: none; z-index: 1000;
        }

        #navbar li:hover .tooltip { opacity: 1; transform: translateX(0); }

        main {
            flex-grow: 1; position: relative; z-index: 10;
            display: flex; flex-direction: column;
            padding: 40px; overflow-y: auto;
            align-items: center;
        }

        .hometitle {
            font-size: 4rem; font-weight: 900; margin-bottom: 10px; letter-spacing: -3px;
            background: linear-gradient(to bottom, var(--cherri-pink-light) 0%, var(--cherri-pink-mid) 50%, var(--cherri-pink-soft-dark) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px var(--accent-glow)); line-height: 1;
            text-align: center;
        }

        .inputcontainer {
            background: var(--bg-2); border: 1px solid var(--border-grey);
            border-radius: 12px; padding: 14px 20px;
            display: flex; align-items: center; gap: 15px;
            transition: all 0.3s ease; width: 100%; max-width: 600px;
            margin: 20px auto 40px auto;
        }

        .inputcontainer:focus-within { border-color: var(--accent); background: var(--bg-3); }
        .inputcontainer input {
            background: none; border: none; outline: none;
            color: var(--text-white); font-size: 1rem; width: 100%;
        }

        .zone-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px; width: 100%; max-width: 1200px;
        }

        .zone-item {
            background: var(--bg-2); border: 1px solid var(--border-grey);
            border-radius: 16px; overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative;
            aspect-ratio: 2/3;
        }

        .zone-item:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(243, 101, 172, 0.2);
        }

        .zone-item img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* Hover Overlay */
        .zone-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px 15px; transform: translateY(100%);
            transition: transform 0.3s ease;
            text-align: center;
        }

        .zone-item:hover .zone-overlay {

        }

        .zone-overlay h4 {
            font-size: 1rem; font-weight: 700; color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);

            background: #000; z-index: 2000; display: none; flex-direction: column;
        }

            background: #0a0a0a; border-bottom: 1px solid var(--border-grey);
            padding: 15px 25px; display: flex; align-items: center; justify-content: space-between;

        #zoneName { color: var(--accent); font-weight: 700; letter-spacing: 1px; }

        .zone-controls { display: flex; gap: 10px; }
        .zone-controls button {
            background: var(--bg-3); border: 1px solid var(--border-grey);
            color: white; padding: 8px 15px; border-radius: 8px;
            cursor: pointer; transition: 0.2s;
        }

        .zone-controls button:hover { background: var(--accent); border-color: var(--accent); }

        #zoneFrame { flex-grow: 1; border: none; background: #000; }

        #popupOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 3000;

        .popup {
            background: #111; border: 1px solid var(--border-grey);
            border-radius: 24px; width: 90%; max-width: 450px; overflow: hidden;

        // Particle background logic
        const pJS = function(tag_id) {
            const canvas_el = document.createElement('canvas');
            canvas_el.style.width = "100%"; canvas_el.style.height = "100%";
            document.getElementById(tag_id).appendChild(canvas_el);
            const ctx = canvas_el.getContext('2d');
            let canvas_w, canvas_h, particles = [];
            const init = () => {
                canvas_w = canvas_el.width = canvas_el.offsetWidth;
                canvas_h = canvas_el.height = canvas_el.offsetHeight;
                particles = [];
                for (let i = 0; i < 60; i++) {
                    const shade = Math.floor(Math.random() * 50) + 40; 
                    particles.push({
                        x: Math.random() * canvas_w, 
                        y: Math.random() * canvas_h,
                        vx: Math.random() * 1.5 + 0.5, 
                        vy: Math.random() * 1.5 + 0.5,
                        radius: Math.random() * 2 + 1, 
                        color: `rgb(${shade}, ${shade}, ${shade})`
                    });
                }
            };
            const draw = () => {
                ctx.clearRect(0, 0, canvas_w, canvas_h);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x > canvas_w) p.x = 0; 
                    if (p.y > canvas_h) p.y = 0;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                });
                requestAnimationFrame(draw);
            };
            window.addEventListener('resize', init);
            init(); draw();
        };

        function filterMovies() {
            const query = searchBar.value.toLowerCase();
            const filtered = movieDatabase.filter(m => m.name.toLowerCase().includes(query));
            displayMovies(filtered, container);
        }

        function openMovie(movie) {
            currentUrl = movie.url;
            zoneFrame.src = movie.url;
            document.getElementById('zoneName').textContent = movie.name;
            zoneViewer.style.display = "flex";
        }

        function openExternalNow() {
            if (currentUrl) window.open(currentUrl, '_blank');
        }

        openExternalBtn.onclick = openExternalNow;

        function closeZone() {
            zoneViewer.style.display = "none";
            zoneFrame.src = "about:blank";
            currentUrl = "";
        }

        function fullscreenZone() {
            if (zoneFrame.requestFullscreen) zoneFrame.requestFullscreen();
            else if (zoneFrame.webkitRequestFullscreen) zoneFrame.webkitRequestFullscreen();
        }

        function closePopup() { document.getElementById('popupOverlay').style.display = "none"; }

        window.onload = () => {
            pJS('particles-js');
            displayMovies(movieDatabase, container);
            displayMovies(movieDatabase.filter(m => m.featured), featuredContainer);
            
            document.getElementById('allSummary').textContent = `All Cinema (${movieDatabase.length})`;
            document.getElementById('featuredSummary').textContent = `Featured Vaults (${movieDatabase.filter(m => m.featured).length})`;

            ['section1nav', 'section2nav', 'section3nav'].forEach((id, i) => {
                setTimeout(() => { document.getElementById(id).style.left = "0"; }, 150 + (i * 120));
            });
        };

        document.getElementById('settingsBtn').onclick = () => {
            document.getElementById('popupOverlay').style.display = "flex";
            document.getElementById('popupBody').innerHTML = `
                <p style="color:#888; margin-bottom:20px;">Cherri Cinema V2 Configuration</p>
                <button onclick="location.reload()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; width:100%;">Refresh Gallery</button>
            `;
        };
    </script>
</body>
</html>
