<script>
// --- UI Logic ---
function filterMovies() {
  let input = document.getElementById('searchBar').value.toLowerCase();
  let btns = document.querySelectorAll('#movieList button');
  btns.forEach(b => {
    b.style.display = b.innerText.toLowerCase().includes(input) ? "block" : "none";
  });
}

function updateClock() {
  const now = new Date();
  let h = now.getHours();
  let m = now.getMinutes().toString().padStart(2, '0');
  let ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('big-clock').textContent = `${h}:${m} ${ampm}`;
}
setInterval(updateClock, 1000);
updateClock();

// --- Interactive Particle Script ---
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [];
const mouse = { x: null, y: null };
let driftX = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

window.addEventListener('mousemove', (e) => {
  mouse.x = e.x;
  mouse.y = e.y;
  driftX = (e.x - window.innerWidth / 2) / 60; 
});

window.addEventListener('mouseout', () => {
  mouse.x = null;
  mouse.y = null;
  driftX = 0;
});

for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.5,
    baseSpeed: Math.random() * 0.8 + 0.2,
    active: 0 
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  stars.forEach(s => {
    let isNear = false;
    if (mouse.x !== null) {
      let dx = mouse.x - s.x;
      let dy = mouse.y - s.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 80) isNear = true;
    }

    if (isNear) {
      s.active = Math.min(s.active + 0.1, 1);
    } else {
      s.active = Math.max(s.active - 0.05, 0);
    }

    let speedMult = 1 + (s.active * 4);
    s.y -= s.baseSpeed * speedMult;
    s.x -= driftX * (s.baseSpeed / 2);

    let cyanValue = Math.floor(s.active * 255);
    ctx.fillStyle = `rgb(${255 - cyanValue}, 255, 255)`;
    
    if (s.active > 0) {
      ctx.shadowBlur = s.active * 15;
      ctx.shadowColor = "#00f2ff";
    } else {
      ctx.shadowBlur = 0;
    }

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r + (s.active * 1), 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    if (s.y < -10) { 
      s.y = canvas.height + 10; 
      s.x = Math.random() * canvas.width;
    }
    if (s.x < -20) s.x = canvas.width + 20;
    if (s.x > canvas.width + 20) s.x = -20;
  });

  requestAnimationFrame(animate);
}
animate();

if (navigator.getBattery) {
  navigator.getBattery().then(function(battery) {
    const updateB = () => document.getElementById("battery").textContent = `PWR: ${Math.floor(battery.level * 100)}%`;
    updateB();
    battery.addEventListener('levelchange', updateB);
  });
}
</script>
