<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cherri | Game Vault</title>
    
    <!-- Dependencies -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000000;
            --bg-2: #0a0a0a;
            --bg-3: #121212;
            --border-grey: #2a2a2a;
            --accent: #f365ac;
            --accent-glow: rgba(243, 101, 172, 0.4);
            --text-white: #ffffff;
            --text-grey: #b0b0b0;
            --nav-width: 75px;
            --cherri-pink-light: #ffb3d9;
            --cherri-pink-mid: #f365ac;
            --cherri-pink-soft-dark: #d64d92;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Figtree', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-white);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex;
        }

        #particles-js {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
        }

        #navbar {
            position: relative; z-index: 100;
            width: var(--nav-width); height: 100%;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-grey);
            display: flex; flex-direction: column;
            padding: 25px 0; align-items: center;
        }

        #navbar ul {
            list-style: none; width: 100%; padding: 0 12px; margin-bottom: 20px;
            display: flex; flex-direction: column; gap: 12px;
            position: relative; left: -100px;
            transition: left 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #navbar li {
            position: relative; display: flex; align-items: center; justify-content: center;
            width: 50px; height: 50px; border-radius: 14px;
            color: var(--text-grey); cursor: pointer; transition: all 0.3s ease;
        }

        #navbar li:hover { background: rgba(255, 255, 255, 0.08); color: var(--text-white); }
        #navbar li.active { background: rgba(243, 101, 172, 0.15); color: var(--accent); }

        .tooltip {
            position: absolute; left: 70px; background: #1a1a1a;
            color: white; padding: 8px 14px; border-radius: 8px; font-size: 0.85rem;
            opacity: 0; transform: translateX(-10px); transition: all 0.2s ease;
            border: 1px solid var(--border-grey); pointer-events: none; z-index: 1000;
        }

        #navbar li:hover .tooltip { opacity: 1; transform: translateX(0); }

        main {
            flex-grow: 1; position: relative; z-index: 10;
            display: flex; flex-direction: column;
            padding: 40px; overflow-y: auto;
            align-items: center;
        }

        .hometitle {
            font-size: 4rem; font-weight: 900; margin-bottom: 10px; letter-spacing: -3px;
            background: linear-gradient(to bottom, var(--cherri-pink-light) 0%, var(--cherri-pink-mid) 50%, var(--cherri-pink-soft-dark) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px var(--accent-glow)); line-height: 1;
            text-align: center;
        }

        .inputcontainer {
            background: var(--bg-2); border: 1px solid var(--border-grey);
            border-radius: 12px; padding: 14px 20px;
            display: flex; align-items: center; gap: 15px;
            transition: all 0.3s ease; width: 100%; max-width: 600px;
            margin: 20px auto 40px auto;
        }

        .inputcontainer:focus-within { border-color: var(--accent); background: var(--bg-3); }
        .inputcontainer input {
            background: none; border: none; outline: none;
            color: var(--text-white); font-size: 1rem; width: 100%;
        }

        .zone-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px; width: 100%; max-width: 1200px;
        }

        .zone-item {
            background: var(--bg-2); border: 1px solid var(--border-grey);
            border-radius: 16px; overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative;
        }

        .zone-item:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(243, 101, 172, 0.2);
        }

        .zone-item img {
            width: 100%; aspect-ratio: 1; object-fit: cover;
            border-bottom: 1px solid var(--border-grey);
        }

        .zone-item button {
            background: transparent; color: var(--text-white);
            border: none; padding: 12px; width: 100%;
            font-weight: 600; font-size: 0.85rem; cursor: pointer;
        }

        #zoneViewer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 2000; display: none; flex-direction: column;
        }

        .zone-header {
            background: #0a0a0a; border-bottom: 1px solid var(--border-grey);
            padding: 15px 25px; display: flex; align-items: center; justify-content: space-between;
        }

        #zoneName { color: var(--accent); font-weight: 700; letter-spacing: 1px; }

        .zone-controls button {
            background: var(--bg-3); border: 1px solid var(--border-grey);
            color: white; padding: 8px 15px; border-radius: 8px;
            cursor: pointer; margin-left: 10px; transition: 0.2s;
        }

        .zone-controls button:hover { background: var(--accent); border-color: var(--accent); }

        #zoneFrame { flex-grow: 1; border: none; background: #000; }

        #popupOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 3000;
        }

        .popup {
            background: #111; border: 1px solid var(--border-grey);
            border-radius: 24px; width: 90%; max-width: 450px; overflow: hidden;
        }

        .popup-header {
            background: linear-gradient(to right, var(--cherri-pink-mid), var(--cherri-pink-soft-dark));
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
        }

        #popupBody { padding: 30px; text-align: center; }

        summary { color: var(--accent); margin: 20px 0; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        
        .loading-text { color: var(--text-grey); font-style: italic; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <nav id="navbar">
        <ul id="section1nav">
            <li class="active" onclick="location.reload()"><i class="fa-solid fa-house"></i><div class="tooltip">Home</div></li>
        </ul>
        <ul id="section2nav">
            <li><i class="fa-solid fa-fire-flame-curved"></i><div class="tooltip">Trending</div></li>
            <li><i class="fa-solid fa-gamepad"></i><div class="tooltip">All Games</div></li>
        </ul>
        <ul id="section3nav">
            <li id="settingsBtn"><i class="fa-solid fa-gear"></i><div class="tooltip">Settings</div></li>
        </ul>
    </nav>

    <main>
        <h1 class="hometitle">Cherri</h1>
        
        <div class="inputcontainer">
            <i class="fa-solid fa-magnifying-glass" style="color: var(--accent);"></i>
            <input type="text" id="searchBar" placeholder="Search for a zone..." oninput="filterZones()">
        </div>

        <details open>
            <summary id="featuredSummary">Featured Vaults</summary>
            <div id="featuredZones" class="zone-container"></div>
        </details>

        <details open>
            <summary id="allSummary">All Zones</summary>
            <div id="container" class="zone-container">
                <p class="loading-text">Loading Cherri Database...</p>
            </div>
        </details>
    </main>

    <div id="zoneViewer">
        <div class="zone-header">
            <div class="zone-title">
                <h2 id="zoneName">Zone Name</h2>
                <span id="zoneAuthor" style="font-size: 0.8rem; color: #888;">by Author</span>
            </div>
            <div class="zone-controls">
                <button onclick="fullscreenZone()"><i class="fa-solid fa-expand"></i></button>
                <button onclick="closeZone()">CLOSE</button>
            </div>
        </div>
        <!-- Sandbox attribute helps prevent the iframe from redirecting the parent window -->
        <iframe id="zoneFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock"></iframe>
    </div>

    <div id="popupOverlay">
        <div class="popup">
            <div class="popup-header">
                <h3 id="popupTitle">Settings</h3>
                <button onclick="closePopup()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <div id="popupBody"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const featuredContainer = document.getElementById('featuredZones');
        const zoneViewer = document.getElementById('zoneViewer');
        const zoneFrame = document.getElementById('zoneFrame');
        const searchBar = document.getElementById('searchBar');
        
        const zonesURL = "https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json";
        const coverURL = "https://cdn.jsdelivr.net/gh/gn-math/covers@main";
        const htmlURL = "https://cdn.jsdelivr.net/gh/gn-math/html@main";
        let zones = [];

        // Particles
        const pJS = function(tag_id) {
            const canvas_el = document.createElement('canvas');
            canvas_el.style.width = "100%"; canvas_el.style.height = "100%";
            document.getElementById(tag_id).appendChild(canvas_el);
            const ctx = canvas_el.getContext('2d');
            let canvas_w, canvas_h, particles = [];
            const init = () => {
                canvas_w = canvas_el.width = canvas_el.offsetWidth;
                canvas_h = canvas_el.height = canvas_el.offsetHeight;
                particles = [];
                for (let i = 0; i < 60; i++) {
                    const shade = Math.floor(Math.random() * 50) + 40; 
                    particles.push({
                        x: Math.random() * canvas_w, y: Math.random() * canvas_h,
                        vx: Math.random() * 0.4 - 0.2, vy: Math.random() * 0.4 - 0.2,
                        radius: Math.random() * 2 + 1, color: `rgb(${shade}, ${shade}, ${shade})`
                    });
                }
            };
            const draw = () => {
                ctx.clearRect(0, 0, canvas_w, canvas_h);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x > canvas_w) p.x = 0; if (p.y > canvas_h) p.y = 0;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                });
                requestAnimationFrame(draw);
            };
            window.addEventListener('resize', init);
            init(); draw();
        };

        async function listZones() {
            try {
                const response = await fetch(zonesURL + "?t=" + Date.now());
                zones = await response.json();
                displayZones(zones, container);
                displayZones(zones.filter(z => z.featured), featuredContainer);
                document.getElementById('allSummary').textContent = `All Zones (${zones.length})`;
                document.getElementById('featuredSummary').textContent = `Featured Vaults (${zones.filter(z => z.featured).length})`;
            } catch (e) { container.innerHTML = "Cherri Error: " + e; }
        }

        function displayZones(data, target) {
            target.innerHTML = "";
            data.forEach(file => {
                const item = document.createElement("div");
                item.className = "zone-item";
                const imgPath = file.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
                item.innerHTML = `
                    <img src="${imgPath}" loading="lazy" onerror="this.src='https://via.placeholder.com/160?text=No+Cover'">
                    <button>${file.name}</button>
                `;
                item.onclick = (e) => {
                    e.preventDefault();
                    openZone(file);
                };
                target.appendChild(item);
            });
        }

        function filterZones() {
            const query = searchBar.value.toLowerCase();
            const filtered = zones.filter(z => z.name.toLowerCase().includes(query));
            displayZones(filtered, container);
        }

        function openZone(file) {
            // ANTI-REDIRECT LOGIC: 
            // We force load the .html version from the GN-Math CDN rather than visiting the external URL.
            // This prevents motorsnag.com redirects.
            const url = file.url.replace("{HTML_URL}", htmlURL);
            
            // Clean up the URL if it was already an external link
            let fetchUrl = url;
            if (url.startsWith("http") && !url.includes("cdn.jsdelivr.net")) {
                // If it's a raw URL, try to point it to the local HTML repo fallback if possible
                // Otherwise, load it in the sandboxed iframe.
                console.log("Loading external resource in sandboxed mode: " + url);
                zoneFrame.src = url;
                document.getElementById('zoneName').textContent = file.name;
                document.getElementById('zoneAuthor').textContent = "by " + file.author;
                zoneViewer.style.display = "flex";
                return;
            }

            fetch(fetchUrl + "?t=" + Date.now())
                .then(res => res.text())
                .then(html => {
                    const doc = zoneFrame.contentDocument || zoneFrame.contentWindow.document;
                    doc.open();
                    // Inject a script into the iframe to try and block top-level navigation
                    const safetyScript = `<script>window.onbeforeunload = function() { return "Staying in Cherri!"; };<\/script>`;
                    doc.write(safetyScript + html);
                    doc.close();
                    document.getElementById('zoneName').textContent = file.name;
                    document.getElementById('zoneAuthor').textContent = "by " + file.author;
                    zoneViewer.style.display = "flex";
                })
                .catch(error => {
                    console.error("Failed to load via CDN, falling back to iframe src: ", error);
                    zoneFrame.src = url;
                    zoneViewer.style.display = "flex";
                });
        }

        function closeZone() {
            zoneViewer.style.display = "none";
            zoneFrame.src = "about:blank";
            const doc = zoneFrame.contentDocument || zoneFrame.contentWindow.document;
            if(doc) { doc.open(); doc.write(""); doc.close(); }
        }

        function fullscreenZone() {
            if (zoneFrame.requestFullscreen) zoneFrame.requestFullscreen();
            else if (zoneFrame.webkitRequestFullscreen) zoneFrame.webkitRequestFullscreen();
        }

        function closePopup() { document.getElementById('popupOverlay').style.display = "none"; }

        window.onload = () => {
            pJS('particles-js');
            listZones();
            ['section1nav', 'section2nav', 'section3nav'].forEach((id, i) => {
                setTimeout(() => { document.getElementById(id).style.left = "0"; }, 150 + (i * 120));
            });
        };

        document.getElementById('settingsBtn').onclick = () => {
            document.getElementById('popupOverlay').style.display = "flex";
            document.getElementById('popupBody').innerHTML = `
                <p style="color:#888; margin-bottom:20px;">Cherri V2 Configuration</p>
                <button onclick="location.reload()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; width:100%;">Refresh App</button>
            `;
        };
    </script>
</body>
</html>
