    <style>
    :root {
    --bg: #000000;
    --surface: #111111;
    --text: #eeeeee;
    --border: #333333;
    --textbox: #1e293b;
    --accent: #f365ac;
    --accent-glow: rgba(243, 101, 172, 0.3);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
}

/* ================= BLUR UTILITIES ================= */
.backdrop-blur-md {
    backdrop-filter: blur(12px);
}

/* ================= LOADING SCREEN ================= */
#loadingScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    color: white;
}

.loader {
    width: 50px;
    height: 50px;
    border: 5px solid #333;
    border-top: 5px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

#loadingScreen.fade-out {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
}

/* ================= PARTICLES ================= */
#particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.6;
    cursor: none;
}

/* ================= HEADER ================= */
header {
    position: sticky;
    top: 0;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    padding: 1rem 0;
}

.header-upper {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
}

.logo {
    font-size: 2rem;
    font-weight: 800;
    cursor: pointer;
}

.search-wrapper {
    flex: 1;
    max-width: 500px;
    position: relative;
}

.search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
}

#searchBar {
    width: 100%;
    padding: 14px 20px 14px 50px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: white;
    outline: none;
    font-size: 1.05rem;
}

.header-actions {
    display: flex;
    gap: 12px;
}

.btn-icon {
    background: #222;
    color: white;
    border: 1px solid #444;
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-icon:hover {
    background: #333;
    border-color: var(--accent);
}

/* Nav Bar */
.nav-bar {
    background: rgba(10, 10, 10, 0.95);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
}

.nav-content {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    gap: 30px;
}

.nav-link {
    padding: 8px 16px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
}

.nav-link.active, .nav-link:hover {
    background: rgba(243, 101, 172, 0.15);
    color: var(--accent);
}

/* ================= TITLE ================= */
.hometitle {
    text-align: center;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 900;
    margin: 2.5rem 0 1.5rem;
    letter-spacing: -3px;
    background: linear-gradient(to bottom, #ffb3d9, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ================= SECTION HEADER ================= */
.section-header {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.section-title {
    font-size: 1.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
}

.collapse-arrow {
    transition: transform 0.3s;
}

details[open] .collapse-arrow {
    transform: rotate(180deg);
}

/* ================= GRID ================= */
.zone-container, .grid-layout {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 40px 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 30px;
}

/* ================= GAME CARD ================= */
.zone-item {
    width: 100%;
    aspect-ratio: 1 / 1.5;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
}

.zone-item:hover {
    transform: translateY(-8px) scale(1.03);
    border-color: var(--accent);
    box-shadow: 0 15px 35px rgba(243, 101, 172, 0.2);
}

.zone-item img {
    width: 100%;
    height: 65%;
    object-fit: cover;
}

.zone-item button {
    width: 100%;
    height: 35%;
    background: var(--textbox);
    border: none;
    color: white;
    font-size: 1rem;
    font-weight: 600;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
}

/* ================= SWIPER STYLES (for featured & trending) ================= */
.swiper {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 0;
}

.swiper-slide {
    width: 280px;
    height: 380px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.swiper-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ================= GAME VIEWER ================= */
#zoneViewer {
    position: fixed;
    inset: 0;
    background: black;
    z-index: 2000;
    display: none;
    flex-direction: column;
}

.zone-header {
    background: #111;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #333;
}

.zone-controls button {
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 10px 16px;
    margin-left: 10px;
    border-radius: 6px;
    cursor: pointer;
}

#zoneFrame {
    flex: 1;
    border: none;
}

/* ================= ONLINE COUNTER ================= */
#onlineCounter {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    border: 1px solid #333;
    padding: 8px 16px;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    z-index: 9999;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 1200px) {
    .zone-container, .grid-layout {
        grid-template-columns: repeat(4, 1fr);
    }
}

@media (max-width: 800px) {
    .zone-container, .grid-layout {
        grid-template-columns: repeat(3, 1fr);
        padding: 0 30px 4rem;
    }
}

@media (max-width: 500px) {
    .zone-container, .grid-layout {
        grid-template-columns: repeat(2, 1fr);
        padding: 0 20px 4rem;
    }
}

/* ====================== SETTINGS MODAL ====================== */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    backdrop-filter: blur(12px);
}

.modal-content {
    background: var(--surface);
    width: 100%;
    max-width: 520px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 30px 60px var(--accent-glow);
    border: 1px solid var(--border);
}

.modal-header {
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
}

.modal-header h2 {
    margin: 0;
    font-size: 1.6rem;
    color: var(--text);
}

.modal-close {
    background: none;
    border: none;
    font-size: 2rem;
    color: #888;
    cursor: pointer;
    padding: 0 10px;
}

.modal-close:hover {
    color: var(--accent);
}

/* Modal Body */
.modal-body {
    padding: 2rem;
}

.setting-row {
    margin-bottom: 2rem;
}

.setting-row label {
    display: block;
    margin-bottom: 10px;
    font-weight: 600;
    color: var(--text);
    font-size: 1.05rem;
}

/* Toggle Switch */
.toggle-label {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    font-size: 1.1rem;
    color: var(--text);
}

.toggle-label input[type="checkbox"] {
    width: 48px;
    height: 26px;
    appearance: none;
    background: #333;
    border-radius: 50px;
    position: relative;
    cursor: pointer;
    transition: 0.3s;
}

.toggle-label input[type="checkbox"]:checked {
    background: var(--accent);
}

.toggle-label input[type="checkbox"]::before {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
}

.toggle-label input[type="checkbox"]:checked::before {
    transform: translateX(22px);
}

/* Buttons */
.modal-btn {
    width: 100%;
    padding: 14px 20px;
    background: #222;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    margin-top: 8px;
}

.modal-btn:hover {
    background: #333;
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
}

.accent-btn {
    background: var(--accent);
    color: #000;
    font-weight: 700;
}

.accent-btn:hover {
    background: #ffb3d9;
    transform: translateY(-3px);
    box-shadow: 0 10px 25px var(--accent-glow);
}

/* Theme Grid */
.theme-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.theme-option {
    padding: 16px 12px;
    text-align: center;
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.25s ease;
}

.theme-option:hover {
    transform: scale(1.05);
}

.theme-option.active {
    border-color: var(--accent);
    background: rgba(243, 101, 172, 0.15);
    box-shadow: 0 0 15px var(--accent-glow);
}

<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" style="position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;color:white;">
        <div style="width:50px;height:50px;border:5px solid #333;border-top:5px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;"></div>
        <p id="loadingText">Loading games...</p>
    </div>

    <!-- Particles -->
    <canvas id="particles"></canvas>

    <!-- Header -->
    <header>
        <div class="header-upper">
            <div class="logo" onclick="location.reload()">Spatium</div>
            <div class="search-wrapper">
                <input type="text" id="searchBar" placeholder="Search games..." oninput="filterGames()">
            </div>
            <button onclick="openSettings()" style="background:none;border:none;color:white;font-size:1.6rem;cursor:pointer;">⚙️</button>
        </div>
    </header>

    <main style="max-width:1400px;margin:auto;">
        <h2 style="padding:20px 20px 10px;color:var(--accent);">🔥 Trending This Week</h2>
        <div id="trendingWrapper"></div>

        <h2 style="padding:30px 20px 10px;">Featured Games</h2>
        <div class="grid-layout" id="featuredGrid"></div>

        <h2 style="padding:30px 20px 10px;">All Games</h2>
        <div class="grid-layout" id="allGamesGrid"></div>
    </main>

    <!-- Game Viewer -->
    <div id="zoneViewer" style="display:none;position:fixed;inset:0;background:black;z-index:2000;flex-direction:column;">
        <div style="background:#111;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:white;">
            <h2 id="zoneName">Game Title</h2>
            <div>
                <button onclick="fullscreenZone()">Fullscreen</button>
                <button onclick="closeZone()">Close</button>
            </div>
        </div>
        <iframe id="zoneFrame" style="flex:1;border:none;" allowfullscreen></iframe>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <div style="padding:20px;display:flex;justify-content:space-between;border-bottom:1px solid var(--border);">
                <h2>Settings</h2>
                <button onclick="closeSettings()" style="background:none;border:none;font-size:28px;color:#888;cursor:pointer;">✕</button>
            </div>
            <div style="padding:25px;">
                <button onclick="openInAboutBlank()" class="modal-btn" style="margin-bottom:20px;">🌐 Open site in about:blank (new tab)</button>
            </div>
        </div>
    </div>

    <script>
// ====================== PARTICLES ======================
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height - 100;
        this.size = Math.random() * 3 + 1.5;
        this.speedX = Math.random() * 0.7 + 0.3;
        this.speedY = Math.random() * 0.9 + 0.5;
        this.opacity = Math.random() * 0.4 + 0.25;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x > canvas.width + 100 || this.y > canvas.height + 100) this.reset();
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function initParticles() {
    particles = [];
    for (let i = 0; i < 90; i++) particles.push(new Particle());
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
}

// ====================== GAME LOADING ======================
let allGames = [];

async function loadGames() {
    const loadingText = document.getElementById('loadingText');
    const loadingScreen = document.getElementById('loadingScreen');
    try {
        loadingText.textContent = "Loading games...";
        const res = await fetch('games.json?t=' + Date.now());
        if (!res.ok) throw new Error("games.json not found");
        const data = await res.json();
        allGames = (data.games || data).sort((a, b) =>
            a.name.toLowerCase().localeCompare(b.name.toLowerCase())
        );
        if (allGames.length === 0) throw new Error("No games in JSON");
        console.log(`✅ Loaded ${allGames.length} games`);
        // Featured Games
        const featured = allGames.filter(game => game.featured === true);
        displayGames(featured, 'featuredGrid');
        console.log(`Featured games: ${featured.length}`);
        // Trending This Week
        displayTrending();
        // All Games
        displayGames(allGames, 'allGamesGrid');
        // Hide loading screen
        loadingScreen.classList.add('fade-out');
        setTimeout(() => {
            loadingScreen.style.display = 'none';
        }, 600);
    } catch (err) {
        console.error("Load error:", err);
        loadingText.textContent = "Failed to load games. Check console (F12)";
        loadingText.style.color = "#f365ac";
    }
}

function displayGames(games, containerId) {
    const container = document.getElementById(containerId);
    if (!container) {
        console.error(`Container #${containerId} not found`);
        return;
    }
    container.innerHTML = '';
    if (games.length === 0) {
        container.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: #888; padding: 3rem;">No games found</p>`;
        return;
    }
    games.forEach(game => {
        const div = document.createElement('div');
        div.className = 'zone-item';
        div.innerHTML = `
            <img src="${game.thumbnail}"
                 alt="${game.name}"
                 onerror="this.src='https://via.placeholder.com/300x400/1a1a1a/ffffff?text=${encodeURIComponent(game.name)}'">
            <button>${game.name}</button>
        `;
        div.addEventListener('click', () => openGame(game));
        container.appendChild(div);
    });
}

// ====================== TRENDING THIS WEEK ======================
function displayTrending() {
    const container = document.getElementById('trendingWrapper');
    if (!container) {
        console.error("Container #trendingWrapper not found in HTML");
        return;
    }
    container.innerHTML = '';
    let trendingGames = allGames.filter(game => game.trending === true);
    console.log(`Trending games marked: ${trendingGames.length}`);
    if (trendingGames.length === 0) {
        trendingGames = allGames.slice(0, 8);
        console.warn("⚠️ No games with 'trending: true'. Showing first 8 games as fallback.");
    }
    trendingGames.forEach(game => {
        const slide = document.createElement('div');
        slide.className = 'swiper-slide';
        slide.style.cursor = 'pointer';
        slide.innerHTML = `
            <img src="${game.thumbnail}"
                 alt="${game.name}"
                 onerror="this.src='https://via.placeholder.com/280x380/1a1a1a/ffffff?text=${encodeURIComponent(game.name)}'">
            <p>${game.name}</p>
        `;
        slide.addEventListener('click', () => openGame(game));
        container.appendChild(slide);
    });
}

// ====================== SEARCH ======================
function filterGames() {
    const query = document.getElementById('searchBar').value.toLowerCase().trim();
    if (!query) {
        displayGames(allGames, 'allGamesGrid');
        return;
    }
    const filtered = allGames.filter(game =>
        game.name.toLowerCase().includes(query)
    );
    displayGames(filtered, 'allGamesGrid');
}

// ====================== GAME PLAYER ======================
function openGame(game) {
    const viewer = document.getElementById('zoneViewer');
    const frame = document.getElementById('zoneFrame');
    const title = document.getElementById('zoneName');
    title.textContent = game.name;
    frame.src = `games/${game.folder}/index.html`;
    viewer.style.display = 'flex';
}

function closeZone() {
    const viewer = document.getElementById('zoneViewer');
    const frame = document.getElementById('zoneFrame');
    viewer.style.display = 'none';
    frame.src = 'about:blank';
}

function fullscreenZone() {
    const frame = document.getElementById('zoneFrame');
    if (frame.requestFullscreen) frame.requestFullscreen();
    else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
}

// ====================== SETTINGS ======================
function openSettings() {
    document.getElementById('settingsModal').style.display = 'flex';
    document.getElementById('siteTitleInput').value = document.title;
}

function closeSettings() {
    document.getElementById('settingsModal').style.display = 'none';
}

function toggleParticles(enabled) {
    const canvas = document.getElementById('particles');
    canvas.style.opacity = enabled ? '0.6' : '0';
}

// ==================== FIXED ABOUT:BLANK FUNCTION ====================
function openInAboutBlank() {
    try {
        const newTab = window.open('about:blank', '_blank');
        
        if (newTab) {
            newTab.document.write(`
                <script>
                    window.location.href = "${window.location.href}";
                <\/script>
            `);
            closeSettings();
        } else {
            alert("❌ Popup blocked!\n\nPlease allow popups for this site and try again.");
        }
    } catch (e) {
        console.error("About:blank error:", e);
        alert("Could not open new tab.\nTry right-clicking the page → Open link in new tab.");
    }
}

function changeSiteTitle() {
    const newTitle = document.getElementById('siteTitleInput').value.trim();
    if (newTitle) {
        document.title = newTitle;
        closeSettings();
    }
}

function uploadFavicon() {
    const fileInput = document.getElementById('faviconUpload');
    const file = fileInput.files[0];
    if (!file) return alert("Please select an image");
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('favicon').href = e.target.result;
        closeSettings();
        alert("✅ Favicon updated! (hard refresh if it doesn't change immediately)");
    };
    reader.readAsDataURL(file);
}

const themes = {
    space: { '--bg': '#000000', '--surface': '#111111', '--accent': '#f365ac' },
    aquatic: { '--bg': '#0a1f2f', '--surface': '#132e44', '--accent': '#00d4ff' },
    cherry: { '--bg': '#1a0f14', '--surface': '#2c1b22', '--accent': '#ff8ac4' },
    swamp: { '--bg': '#0f1a0f', '--surface': '#1f2a1f', '--accent': '#7cff7c' }
};

function setTheme(themeName) {
    const root = document.documentElement;
    const theme = themes[themeName];
    Object.keys(theme).forEach(key => root.style.setProperty(key, theme[key]));

    document.querySelectorAll('.theme-option').forEach(el => {
        el.classList.toggle('active', el.getAttribute('data-theme') === themeName);
    });
    closeSettings();
}

// ====================== INIT ======================
window.onload = () => {
    resizeCanvas();
    initParticles();
    animateParticles();
    loadGames();

    const searchBar = document.getElementById('searchBar');
    if (searchBar) searchBar.addEventListener('input', filterGames);

    window.addEventListener('resize', resizeCanvas);
    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") closeZone();
    });
};
    </script>
</body>
